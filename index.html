<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vaibhav Creation | Wedding Videographer Zirapur</title>

<meta name="description" content="Vaibhav Creation - Professional Wedding Videographer in Zirapur. Cinematic Wedding Films, Pre Wedding Shoot, Reels & Video Editing.">

<meta name="keywords" content="Wedding Videographer Zirapur, Wedding Shoot Zirapur, Video Editing Zirapur">

<style>

body{
margin:0;
font-family:Arial;
color:white;
background:black;
}

/* VIDEO BACKGROUND */

.video-bg{
position:fixed;
right:0;
bottom:0;
min-width:100%;
min-height:100%;
z-index:-1;
}

/* HERO SECTION */

.hero{
text-align:center;
padding-top:200px;
}

.hero h1{
font-size:50px;
}

.button{
background:#ff0066;
padding:15px 30px;
color:white;
text-decoration:none;
border-radius:30px;
font-size:18px;
}

/* SECTION */

section{
padding:60px 20px;
text-align:center;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* WHATSAPP FORM */

.form input, .form textarea{
width:90%;
padding:10px;
margin:10px;
border-radius:5px;
border:none;
}

.form button{
background:green;
color:white;
padding:12px 25px;
border:none;
border-radius:20px;
font-size:16px;
}

</style>
</head>

<body>

<!-- VIDEO BACKGROUND -->

<video autoplay muted loop class="video-bg">
<source src="video.mp4" type="video/mp4">
</video>

<!-- HERO -->

<div class="hero">

<h1>Vaibhav Creation</h1>

<p>Cinematic Wedding Films • Professional Reels • Creative Editing</p>

<a class="button" href="#contact">Book Your Shoot</a>

</div>

<!-- INSTAGRAM REELS -->

<section>

<h2>Instagram Reels</h2>

<div class="gallery">

<blockquote class="instagram-media"
data-instgrm-permalink="YOUR-REEL-LINK"></blockquote>

<blockquote class="instagram-media"
data-instgrm-permalink="YOUR-REEL-LINK"></blockquote>

</div>

</section>

<!-- GOOGLE REVIEWS -->

<section>

<h2>Client Reviews</h2>

<p>⭐️⭐️⭐️⭐️⭐️ Amazing wedding shoot experience!</p>

<p>⭐️⭐️⭐️⭐️⭐️ Best videographer in Zirapur.</p>

</section>

<!-- WHATSAPP BOOKING -->

<section id="contact">

<h2>Book Your Shoot</h2>

<div class="form">

<input type="text" id="name" placeholder="Your Name">

<input type="text" id="phone" placeholder="Phone Number">

<textarea id="message" placeholder="Shoot Details"></textarea>

<br>

<button onclick="sendWhatsApp()">Send on WhatsApp</button>

</div>

</section>

<script>

function sendWhatsApp(){

var name=document.getElementById("name").value;
var phone=document.getElementById("phone").value;
var message=document.getElementById("message").value;

var url="https://wa.me/917415146049?text="
+"Name: "+name+"%0a"
+"Phone: "+phone+"%0a"
+"Details: "+message;

window.open(url,'_blank');

}

</script>

<script async src="//www.instagram.com/embed.js"></script>

</body>
</html>
